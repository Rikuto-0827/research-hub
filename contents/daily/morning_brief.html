<script>
// ── RENDER ENGINE ──
function fmtNum(v){
  if (typeof v !== 'number') return v;
  return v.toLocaleString('en-US', { maximumFractionDigits: 1 });
}
function dirClass(dir){ return dir === 'up' ? 'up' : dir === 'down' ? 'down' : 'flat'; }
function cClass(dir){ return dir==='up'?'c-up':dir==='down'?'c-down':'c-flat'; }
function macroValClass(dir){ return dir==='up'?'up':dir==='down'?'down':''; }
function arrow(dir){ return dir==='up'?'▲':dir==='down'?'▼':'‒'; }

function newsLinksEvent(searchKey){
  if(!searchKey) return '';
  const q = encodeURIComponent(searchKey);
  const wsj = 'https://www.wsj.com/search?query=' + q + '&mod=searchresults_viewallresults';
  const ft = 'https://www.ft.com/search?q=' + q;
  const jp = 'https://news.google.com/search?q=' + q + '&hl=ja&gl=JP';
  return '<a class="ev-link ev-link-wsj" href="' + wsj + '" target="_blank" rel="noopener">WSJで見る</a> ' +
         '<a class="ev-link ev-link-ft" href="' + ft + '" target="_blank" rel="noopener">FTで見る</a> ' +
         '<a class="ev-link ev-link-jp" href="' + jp + '" target="_blank" rel="noopener">関連ニュース</a>';
}
function newsLinksDeal(searchKey){
  if(!searchKey) return '';
  const q = encodeURIComponent(searchKey);
  const wsj = 'https://www.wsj.com/search?query=' + q + '&mod=searchresults_viewallresults';
  const ft = 'https://www.ft.com/search?q=' + q;
  const jp = 'https://news.google.com/search?q=' + q + '&hl=ja&gl=JP';
  return '<div class="deal-links">' +
    '<a class="deal-link dl-wsj" href="' + wsj + '" target="_blank" rel="noopener">WSJ</a>' +
    '<a class="deal-link dl-ft" href="' + ft + '" target="_blank" rel="noopener">FT</a>' +
    '<a class="deal-link dl-jp" href="' + jp + '" target="_blank" rel="noopener">関連ニュース</a>' +
  '</div>';
}

function renderIdxCard(idx){
  if(!idx) return '';
  const chg = (typeof idx.change === 'number') ? (idx.change>=0?'+':'') + fmtNum(idx.change) : idx.change;
  const pct = (typeof idx.pct === 'number') ? (idx.pct>=0?'+':'') + idx.pct.toFixed(2) + '%' : idx.pct;
  return '<div class="idx-card ' + dirClass(idx.dir) + '">' +
    '<div class="idx-name">' + idx.flag + ' ' + idx.name + '</div>' +
    '<div class="idx-val">' + fmtNum(idx.value) + '</div>' +
    '<div class="idx-chg ' + cClass(idx.dir) + '">' + arrow(idx.dir) + ' ' + chg + ' (' + pct + ')</div>' +
  '</div>';
}

function renderMacro(macro){
  if(!macro) return '';
  return Object.keys(macro).map(function(k){
    const v = macro[k];
    return '<div class="macro-item"><span class="macro-lbl">' + k + '</span>' +
      '<span class="macro-val ' + macroValClass(v.dir) + '">' + arrow(v.dir) + ' ' + v.value + '</span></div>';
  }).join('');
}

function moverRow(m){
  return '<div class="mover-row">' +
    '<div class="mover-ticker">' + m.ticker + '</div>' +
    '<div class="mover-info"><div class="mover-name">' + m.name + '</div><div class="mover-why">' + m.why + '</div></div>' +
    '<div class="mover-pct ' + m.dir + '">' + (m.pct>=0?'+':'') + m.pct.toFixed(1) + '%</div>' +
  '</div>';
}
function renderMoversLayout(movers){
  movers = movers || [];
  const ups = movers.filter(function(m){ return m.dir === 'up'; });
  const downs = movers.filter(function(m){ return m.dir === 'down'; });
  const upsHtml = ups.length ? ups.map(moverRow).join('') : '<div style="font-size:12px;color:#94a3b8">上昇銘柄なし</div>';
  const downsHtml = downs.length ? downs.map(moverRow).join('') : '<div style="font-size:12px;color:#94a3b8">下落銘柄なし</div>';
  return '<div>' + upsHtml + '</div><div>' + downsHtml + '</div>';
}

function renderEvents(events){
  events = events || [];
  if(!events.length) return '<div style="font-size:12px;color:#94a3b8">本日のイベントなし</div>';
  return events.map(function(e){
    return '<div class="ev-item"><div class="ev-title">' + e.icon + ' ' + e.title + '</div>' +
      '<div class="ev-detail">' + e.detail + '</div>' +
      newsLinksEvent(e.searchKey) + '</div>';
  }).join('');
}

function renderDeal(d){

    '<div class="deal-body">' + d.body + '</div>' +
    '<div class="deal-sig">' + d.sig + '</div>' +
    newsLinksDeal(d.searchKey) +
  '</div>';
}

    '<div class="pc-hdr"><span class="pc-flag">' + flag + '</span><span class="pc-name">' + name + '</span></div>' +
    '<div class="pc-sub">' + sub + '</div>' +
    '<div class="pc-summary">' + (data.summary || '') + '</div>' +
    '<div class="deals-grid">' + deals.map(renderDeal).join('') + '</div>' +
    '<div class="pc-outlook">' + (data.outlook || '') + '</div>' +
  '</div>';
}

  if(!str) return '<p style="color:#94a3b8">本日はナラティブ未生成</p>';

          '<div class="concept-item"><div class="concept-lbl">背景</div><div class="concept-val">' + (kc.background || '') + '</div></div>' +
          '<div class="concept-item"><div class="concept-lbl">実務での使われ方</div><div class="concept-val">' + (kc.practical || '') + '</div></div>' +
          '<div class="concept-item"><div class="concept-lbl">2026年の文脈</div><div class="concept-val">' + (kc.context2026 || '') + '</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="pet-card" style="grid-column:1/-1"><div class="pet-card-hdr">ディール分析：' + (da.title || '') + '</div>' +
        '<div class="da-items">' +
          '<div class="da-item thesis"><div class="da-lbl">投資テーマ</div><div class="da-val">' + (da.thesis || '') + '</div></div>' +
          '<div class="da-item timing"><div class="da-lbl">なぜ今か</div><div class="da-val">' + (da.timing || '') + '</div></div>' +
          '<div class="da-item downside"><div class="da-lbl">ダウンサイド</div><div class="da-val">' + (da.downside || '') + '</div></div>' +
          '<div class="da-item valuation"><div class="da-lbl">バリュエーション</div><div class="da-val">' + (da.valuation || '') + '</div></div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

let chartInstance = null;
function renderChart(reports, uptoIdx){
  const el = document.getElementById('idxChart');
  if(!el || typeof Chart === 'undefined') return;
  const start = Math.max(0, uptoIdx - 14);
  const slice = reports.slice(start, uptoIdx + 1);
  const labels = slice.map(function(r){ return r.dateLabel; });
  function mk(key){ return slice.map(function(r){ return (r.indices && r.indices[key]) ? r.indices[key].value : null; }); }
  if(chartInstance){ chartInstance.destroy(); }
  chartInstance = new Chart(el, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label:'S&P 500', data:mk('sp500'), borderColor:'#3b82f6', backgroundColor:'transparent', tension:.3, yAxisID:'y0' },
        { label:'Nasdaq', data:mk('nasdaq'), borderColor:'#8b5cf6', backgroundColor:'transparent', tension:.3, yAxisID:'y1' },
        { label:'Dow', data:mk('dow'), borderColor:'#10b981', backgroundColor:'transparent', tension:.3, yAxisID:'y1' },
        { label:'Nikkei 225', data:mk('nikkei'), borderColor:'#ef4444', backgroundColor:'transparent', tension:.3, yAxisID:'y2' }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } },
      scales: {
        y0: { display: false },
        y1: { display: false },
        y2: { display: false },
        x: { ticks: { font: { size: 10 } } }
      }
    }
  });
}

let currentIdx = MARKET_REPORTS.length - 1;

function dowLabel(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return ['日','月','火','水','木','金','土'][d.getDay()];
}

function renderTabs(){
  const nav = document.getElementById('tab-nav-inner');
  nav.innerHTML = MARKET_REPORTS.map(function(r, i){
    return '<button class="tab-btn' + (i === currentIdx ? ' active' : '') + '" data-idx="' + i + '">' +
      r.dateLabel + '<span class="dow">' + dowLabel(r.date) + '</span></button>';
  }).join('');
  Array.prototype.forEach.call(nav.querySelectorAll('.tab-btn'), function(btn){
    btn.addEventListener('click', function(){
      currentIdx = parseInt(btn.getAttribute('data-idx'), 10);
      renderAll();
    });
  });
}

function renderPanel(r){
  const idxCards = ['sp500','nasdaq','dow','nikkei'].map(function(k){ return renderIdxCard(r.indices[k]); }).join('');
  return '' +
  '<div class="section"><div class="idx-grid">' + idxCards + '</div></div>' +
  '<div class="section two-col">' +
    '<div class="card"><div class="card-title">📈 主要指数推移</div><div class="chart-wrap"><canvas id="idxChart"></canvas></div></div>' +
    '<div class="card"><div class="card-title">🌐 マクロ指標</div><div class="macro-grid">' + renderMacro(r.macro) + '</div></div>' +
  '</div>' +
  '<div class="section"><div class="sec-title">値動き銘柄</div>' +
    '<div class="movers-card"><div class="movers-layout">' + renderMoversLayout(r.movers) + '</div></div>' +
  '</div>' +
  '<div class="section"><div class="sec-title">本日の注目イベント</div>' +
    '<div class="events-list">' + renderEvents(r.events) + '</div>' +
  '</div>' +
  '<div class="section"><div class="sec-title">🇺🇸 US Private Credit</div>' +
    renderCreditBox('us-box', '🇺🇸', 'US Private Credit', 'ダイレクトレンディング・プライベートクレジット', r.usCredit) +
  '</div>' +
  '<div class="section"><div class="sec-title">🇯🇵 Japan PE / Private Credit</div>' +
    renderCreditBox('jp-box', '🇯🇵', 'Japan PE / Private Credit', 'バイアウト・TOB・メザニン', r.jpCredit) +
  '</div>' +
  '<div class="section"><div class="sec-title">本日のナラティブ</div>' +
    '<div class="narrative-box">' + renderNarrative(r.narrative) + '</div>' +
  '</div>' +
  '<div class="section"><div class="sec-title">PEトレーニング</div>' + renderPeTraining(r.peTraining) + '</div>' +
  '<div class="section"><div class="takeaway"><div class="takeaway-lbl">本日の総括</div>' +
    '<div class="takeaway-txt">' + (r.takeaway || '') + '</div></div></div>';
}

function renderAll(){
  renderTabs();
  const r = MARKET_REPORTS[currentIdx];
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="report-panel active">' + renderPanel(r) + '</div>';
  renderChart(MARKET_REPORTS, currentIdx);
  const tokenInfo = document.getElementById('token-info');
  if(tokenInfo){
    const total = MARKET_REPORTS.reduce(function(s, x){ return s + (x.tokenEstimate || 0); }, 0);
    tokenInfo.textContent = '本日のトークン概算: ' + (r.tokenEstimate || 0).toLocaleString() + ' ｜ 累計: ' + total.toLocaleString();
  }
  document.title = '🇺🇸 US Market Morning Brief (' + r.dateLabel + ') | Private Credit Focus';
  const nav2 = document.getElementById('tab-nav-inner');
  const activeBtn = nav2.querySelector('.tab-btn.active');
  if(activeBtn && activeBtn.scrollIntoView){ activeBtn.scrollIntoView({ inline: 'center', block: 'nearest' }); }
}

renderAll();
</script>
</body>
